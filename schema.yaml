          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        observacao:
          type: string
          nullable: true
        nome_representante:
          type: string
          nullable: true
          maxLength: 50
        setor_representante:
          type: string
          nullable: true
          maxLength: 50
        email_representante:
          type: string
          format: email
          nullable: true
          maxLength: 254
        contato_representante:
          type: string
          nullable: true
          maxLength: 50
        cobranca_revisao_alteracao:
          type: boolean
        ativo:
          type: boolean
