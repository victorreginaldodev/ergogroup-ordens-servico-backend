components:
  schemas:
    AcaoEnum:
      enum:
      - criacao
      - atualizacao
      - exclusao
      - status
      - propagacao_status
      - liberacao_faturamento
      - faturamento
      - liberacao_cobranca
      - contrato
      - backfill
      type: string
      description: |-
        * `criacao` - Criação
        * `atualizacao` - Atualização
        * `exclusao` - Exclusão
        * `status` - Mudança de Status
        * `propagacao_status` - Propagação de Status
        * `liberacao_faturamento` - Liberação para Faturamento
        * `faturamento` - Faturamento
        * `liberacao_cobranca` - Liberação de Cobrança
        * `contrato` - Contrato
        * `backfill` - Backfill
    AnaliseDadosResponse:
      type: object
      properties:
        ordens_servico:
          $ref: '#/components/schemas/OrdensServicoAnalise'
        servicos:
          $ref: '#/components/schemas/ServicoAnalise'
        tarefas:
          $ref: '#/components/schemas/TarefaAnalise'
        minios:
          $ref: '#/components/schemas/MiniOSAnalise'
        clientes:
          $ref: '#/components/schemas/ClientesAnalise'
      required:
      - minios
      - ordens_servico
      - servicos
      - tarefas
    BlankEnum:
      enum:
      - ''
    BlocoCancelamento:
      type: object
      properties:
        total:
          type: integer
        canceladas:
          type: integer
        percentual:
          type: number
          format: double
          nullable: true
      required:
      - canceladas
      - percentual
      - total
    Cliente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tipo_cliente_display:
          type: string
          readOnly: true
        tipo_inscricao_display:
          type: string
          readOnly: true
        nome:
          type: string
          maxLength: 100
        tipo_inscricao:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TipoInscricaoEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        numero_inscricao:
          type: string
          nullable: true
          maxLength: 30
        tipo_cliente:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TipoClienteEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        observacao:
          type: string
          nullable: true
        nome_representante:
          type: string
          nullable: true
          maxLength: 50
        setor_representante:
          type: string
          nullable: true
          maxLength: 50
        email_representante:
          type: string
          format: email
          nullable: true
          maxLength: 254
        contato_representante:
          type: string
          nullable: true
          maxLength: 50
        cobranca_revisao_alteracao:
          type: boolean
        ativo:
          type: boolean
        data_criacao:
          type: string
          format: date-time
          readOnly: true
      required:
      - data_criacao
      - id
      - nome
      - tipo_cliente_display
      - tipo_inscricao_display
    ClienteFaturamento:
      type: object
      properties:
        cliente_id:
          type: integer
        cliente_nome:
          type: string
        total_valor_faturado:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - cliente_id
      - cliente_nome
      - total_valor_faturado
    ClienteList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 100
        tipo_cliente:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TipoClienteEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        tipo_cliente_display:
          type: string
          readOnly: true
        numero_inscricao:
          type: string
          nullable: true
          maxLength: 30
        ativo:
          type: boolean
      required:
      - id
      - nome
      - tipo_cliente_display
    ClienteListRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 1
          maxLength: 100
        tipo_cliente:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TipoClienteEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        numero_inscricao:
          type: string
          nullable: true
          maxLength: 30
        ativo:
