openapi: 3.0.3
info:
  title: ErgoApp API
  version: 1.0.0
  description: Documentação completa das APIs do sistema ErgoApp
paths:
  /api/analise/dados/:
    get:
      operationId: analise_dados_retrieve
      description: |-
        Métricas agregadas dos últimos 12 meses: ordens de serviço, serviços, tarefas, mini OS e clientes.

        Os campos `ordens_servico.vendas_por_mes` e o bloco `clientes` envolvem valores monetários e são omitidos da resposta para os perfis Sub-Líder Técnico, Técnico, Gestor Administrativo e Administrativo.
      summary: Análise de dados
      tags:
      - analise
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnaliseDadosResponse'
          description: ''
  /api/analise/financeiro/kpis/:
    get:
      operationId: analise_financeiro_kpis_retrieve
      description: |-
        Retorna três totalizadores:
        - **total_faturado**: soma das OS já faturadas.
        - **total_para_faturar**: soma das OS liberadas e ainda não faturadas.
        - **total_sem_liberacao**: soma das OS em aberto sem liberação para faturamento.

        Indisponível (403) para os perfis Sub-Líder Técnico, Técnico, Gestor Administrativo e Administrativo.
      summary: KPIs financeiros
      tags:
      - analise
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceiroKPIs'
          description: ''
        '403':
          description: Sem permissão para ver valores financeiros.
  /api/analise/produtividade/:
    get:
      operationId: analise_produtividade_retrieve
      description: 'Indicadores operacionais dos últimos 12 meses: tempos médios de
        execução, taxa de cancelamento e análise individual por técnico (concluídos,
        carga de trabalho atual e tempo médio). Não contém valores monetários nem
        dados de clientes — disponível para qualquer perfil autenticado. Técnicos
        veem apenas a própria linha em `por_tecnico`.'
      summary: Indicadores de execução técnica
      tags:
      - analise
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdutividadeResponse'
          description: ''
  /api/auditoria/registros/:
    get:
      operationId: auditoria_registros_list
      description: Retorna a lista paginada de todos os registros de auditoria. Suporta
        filtragem por entidade, objeto, ação e vínculo com ordens de serviço, serviços,
        tarefas e mini OS.
      summary: Listar registros de auditoria
      parameters:
      - in: query
        name: acao
        schema:
          type: string
          enum:
          - atualizacao
          - backfill
          - contrato
          - criacao
          - exclusao
          - faturamento
          - liberacao_cobranca
          - liberacao_faturamento
          - propagacao_status
          - status
        description: Filtrar pelo tipo de ação registrada.
      - in: query
        name: entidade
        schema:
          type: string
          enum:
          - mini_os
          - ordem_servico
          - servico
          - tarefa
        description: Filtrar por entidade auditada.
      - in: query
        name: mini_os
        schema:
          type: integer
        description: Filtrar pelo ID da mini OS.
      - in: query
        name: objeto_id
        schema:
          type: integer
        description: Filtrar pelo ID do objeto auditado.
      - in: query
        name: ordem_servico
        schema:
          type: integer
        description: Filtrar pelo ID da ordem de serviço.
      - in: query
        name: servico
        schema:
          type: integer
        description: Filtrar pelo ID do serviço.
      - in: query
        name: tarefa
        schema:
          type: integer
        description: Filtrar pelo ID da tarefa.
      tags:
      - auditoria
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistroAuditoria'
          description: ''
  /api/auditoria/registros/{id}/:
    get:
      operationId: auditoria_registros_retrieve
      description: Retorna um único registro de auditoria pelo seu ID.
      summary: Detalhar registro de auditoria
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Registro de Auditoria.
        required: true
      tags:
      - auditoria
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroAuditoria'
          description: ''
  /api/auditoria/registros/mini-os/{mini_os_id}/timeline/:
    get:
      operationId: auditoria_registros_mini_os_timeline_list
      description: Retorna todos os registros de auditoria vinculados a uma mini OS,
        em ordem cronológica decrescente.
      summary: Timeline de uma mini OS
      parameters:
      - in: query
        name: acao
        schema:
          type: string
          enum:
          - atualizacao
          - backfill
          - contrato
          - criacao
          - exclusao
          - faturamento
          - liberacao_cobranca
          - liberacao_faturamento
          - propagacao_status
          - status
        description: Filtrar pelo tipo de ação registrada.
      - in: query
        name: entidade
        schema:
          type: string
          enum:
          - mini_os
          - ordem_servico
          - servico
          - tarefa
        description: Filtrar por entidade auditada.
      - in: query
        name: mini_os
        schema:
          type: integer
        description: Filtrar pelo ID da mini OS.
      - in: path
        name: mini_os_id
        schema:
          type: integer
        description: ID da mini OS.
        required: true
      - in: query
        name: objeto_id
        schema:
          type: integer
        description: Filtrar pelo ID do objeto auditado.
      - in: query
        name: ordem_servico
        schema:
          type: integer
        description: Filtrar pelo ID da ordem de serviço.
      - in: query
        name: servico
        schema:
          type: integer
        description: Filtrar pelo ID do serviço.
      - in: query
        name: tarefa
        schema:
          type: integer
        description: Filtrar pelo ID da tarefa.
      tags:
      - auditoria
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistroAuditoria'
          description: ''
  /api/auditoria/registros/ordens/{ordem_servico_id}/timeline/:
    get:
      operationId: auditoria_registros_ordens_timeline_list
      description: Retorna todos os registros de auditoria vinculados a uma ordem
        de serviço, em ordem cronológica decrescente.
      summary: Timeline de uma ordem de serviço
      parameters:
      - in: query
        name: acao
        schema:
          type: string
          enum:
          - atualizacao
          - backfill
          - contrato
          - criacao
          - exclusao
          - faturamento
          - liberacao_cobranca
          - liberacao_faturamento
          - propagacao_status
          - status
        description: Filtrar pelo tipo de ação registrada.
      - in: query
        name: entidade
        schema:
          type: string
          enum:
          - mini_os
          - ordem_servico
          - servico
          - tarefa
        description: Filtrar por entidade auditada.
      - in: query
        name: mini_os
        schema:
          type: integer
        description: Filtrar pelo ID da mini OS.
      - in: query
        name: objeto_id
        schema:
          type: integer
        description: Filtrar pelo ID do objeto auditado.
      - in: query
        name: ordem_servico
        schema:
          type: integer
        description: Filtrar pelo ID da ordem de serviço.
      - in: path
        name: ordem_servico_id
        schema:
          type: integer
        description: ID da ordem de serviço.
        required: true
      - in: query
        name: servico
        schema:
          type: integer
        description: Filtrar pelo ID do serviço.
      - in: query
        name: tarefa
        schema:
          type: integer
        description: Filtrar pelo ID da tarefa.
      tags:
      - auditoria
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistroAuditoria'
          description: ''
  /api/clientes/clientes/:
    get:
      operationId: clientes_clientes_list
      description: Retorna a lista paginada de clientes com campos resumidos. Suporta
        busca textual e filtragem por tipo e status.
      summary: Listar clientes
      parameters:
      - in: query
        name: ativo
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
        description: Filtrar por status de ativação.
      - in: query
        name: q
        schema:
          type: string
        description: Busca por nome ou número de inscrição (parcial, sem distinção
          de maiúsculas).
      - in: query
        name: tipo
        schema:
          type: string
          enum:
          - avulso
          - fornecedor
          - gestao
        description: Filtrar por tipo de cliente.
      tags:
      - clientes
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClienteList'
          description: ''
    post:
      operationId: clientes_clientes_create
      description: Cria um novo cliente com todos os dados cadastrais.
      summary: Cadastrar cliente
      tags:
      - clientes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
        required: true
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
          description: ''
  /api/clientes/clientes/{id}/:
    get:
      operationId: clientes_clientes_retrieve
      description: Retorna todos os campos cadastrais de um cliente pelo seu ID.
      summary: Detalhar cliente
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Cliente.
        required: true
      tags:
      - clientes
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
          description: ''
    put:
      operationId: clientes_clientes_update
      description: Substitui integralmente os dados cadastrais de um cliente.
      summary: Atualizar cliente
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Cliente.
        required: true
      tags:
      - clientes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
        required: true
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
          description: ''
    patch:
      operationId: clientes_clientes_partial_update
      description: Atualiza um ou mais campos cadastrais de um cliente.
      summary: Atualizar cliente parcialmente
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Cliente.
        required: true
      tags:
      - clientes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClienteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClienteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClienteRequest'
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
          description: ''
    delete:
      operationId: clientes_clientes_destroy
      description: Remove permanentemente um cliente.
      summary: Remover cliente
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Cliente.
        required: true
      tags:
      - clientes
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/contas/auth/login/:
    post:
      operationId: contas_auth_login_create
      description: Autentica com e-mail e senha. Retorna access token, refresh token
        e dados do usuário.
      summary: Login
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '401':
          description: No response body
  /api/contas/auth/logout/:
    post:
      operationId: contas_auth_logout_create
      description: Invalida o refresh token. O cliente deve descartar o access token.
      summary: Logout
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/contas/auth/me/:
    get:
      operationId: contas_auth_me_retrieve
      description: Retorna os dados do usuário autenticado pelo token.
      summary: Usuário autenticado
      tags:
      - contas
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDetail'
          description: ''
  /api/contas/auth/refresh/:
    post:
      operationId: contas_auth_refresh_create
      description: Renova o access token usando o refresh token. Retorna também os
        dados atualizados do usuário.
      summary: Renovar token
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshComUsuarioRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshComUsuarioRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshComUsuarioRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
        '401':
          description: No response body
  /api/contas/usuarios/:
    get:
      operationId: contas_usuarios_list
      description: Retorna a lista paginada de usuários com campos resumidos. Suporta
        busca textual e filtragem por tipo e status.
      summary: Listar usuários
      parameters:
      - in: query
        name: ativo
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
        description: Filtrar por status de ativação.
      - in: query
        name: q
        schema:
          type: string
        description: Busca por nome completo ou e-mail (parcial, sem distinção de
          maiúsculas).
      - in: query
        name: tipo
        schema:
          type: string
          enum:
          - administrativo
          - comercial
          - diretor
          - financeiro
          - gestor_administrativo
          - gestor_comercial
          - gestor_financeiro
          - gestor_tecnico
          - sub_gestor_tecnico
          - tecnico
        description: Filtrar por tipo de usuário.
      tags:
      - contas
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioList'
          description: ''
    post:
      operationId: contas_usuarios_create
      description: Cria um novo usuário. Requer perfil Gestor ou superior.
      summary: Criar usuário
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UsuarioCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UsuarioCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioCreate'
          description: ''
  /api/contas/usuarios/{id}/:
    get:
      operationId: contas_usuarios_retrieve
      description: Retorna todos os campos cadastrais de um usuário pelo seu ID.
      summary: Detalhar usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDetail'
          description: ''
    put:
      operationId: contas_usuarios_update
      description: Substitui integralmente os dados cadastrais de um usuário. Cada
        usuário pode editar o próprio cadastro; gestores podem editar qualquer usuário.
      summary: Atualizar usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UsuarioUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UsuarioUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioUpdate'
          description: ''
    patch:
      operationId: contas_usuarios_partial_update
      description: Atualiza um ou mais campos cadastrais de um usuário. Cada usuário
        pode editar o próprio cadastro; gestores podem editar qualquer usuário.
      summary: Atualizar usuário parcialmente
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUsuarioUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUsuarioUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUsuarioUpdateRequest'
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioUpdate'
          description: ''
    delete:
      operationId: contas_usuarios_destroy
      description: Remove permanentemente um usuário. Requer perfil Gestor ou superior.
      summary: Remover usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/contas/usuarios/{id}/alterar-senha/:
    patch:
      operationId: contas_usuarios_alterar_senha_partial_update
      description: Altera a senha de um usuário. Cada usuário pode alterar a própria
        senha informando a senha atual. Diretores e Gestores Administrativos podem
        alterar a senha de qualquer usuário sem informar a senha atual.
      summary: Alterar senha
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAlterarSenhaRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAlterarSenhaRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAlterarSenhaRequest'
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detalhe'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/contas/usuarios/{id}/ativar/:
    patch:
      operationId: contas_usuarios_ativar_partial_update
      description: Marca um usuário como ativo, permitindo que ele acesse o sistema.
        Requer perfil Gestor ou superior.
      summary: Ativar usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
      - contas
      security:
      - jwtAuth: []
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detalhe'
          description: ''
  /api/contas/usuarios/{id}/desativar/:
    patch:
      operationId: contas_usuarios_desativar_partial_update
      description: Marca um usuário como inativo, bloqueando o acesso ao sistema.
        Requer perfil Gestor ou superior. Não é possível desativar o próprio usuário.
      summary: Desativar usuário
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this usuário.
        required: true
      tags:
